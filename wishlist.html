<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist | FETA Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<div class="logo">
FETA
</div>


<nav class="navbar">

<a href="index.html">Home</a>

<a href="shop.html">Shop</a>

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

</nav>


<div class="header-icons">

<a href="wishlist.html">♡</a>

<a href="cart.html">🛒</a>

</div>

</header>





<section class="wishlist-section">


<h1>
Your Wishlist ❤️
</h1>



<div id="wishlist-items">


</div>



</section>







<footer>


<div class="footer-logo">
FETA
</div>


<p>
Premium Fashion Store Ethiopia
</p>


</footer>







<script src="script.js"></script>



<script>


function displayWishlist(){


let wishlist = JSON.parse(localStorage.getItem("fetaWishlist")) || [];


let container=document.getElementById("wishlist-items");



if(wishlist.length===0){


container.innerHTML="<h3>Your wishlist is empty ❤️</h3>";


return;


}



container.innerHTML="";



wishlist.forEach((item,index)=>{


container.innerHTML += `


<div class="wishlist-item">


<h3>${item}</h3>


<p>
ETB 2,500
</p>



<button onclick="moveToCart('${item}')">

Add To Cart 🛒

</button>



<button onclick="removeWishlist(${index})">

Remove

</button>



</div>


`;



});



}





function removeWishlist(index){


let wishlist=JSON.parse(localStorage.getItem("fetaWishlist")) || [];


wishlist.splice(index,1);


localStorage.setItem("fetaWishlist",JSON.stringify(wishlist));


displayWishlist();


}





function moveToCart(product){


let cart=JSON.parse(localStorage.getItem("fetaCart")) || [];


cart.push(product);


localStorage.setItem("fetaCart",JSON.stringify(cart));


alert(product+" added to cart 🛒");


}





displayWishlist();


</script>



</body>

</html>
